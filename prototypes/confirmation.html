<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Order Confirmed - Brand Energy</title>
    <link rel="stylesheet" href="../styles/checkout.css">
    <link rel="stylesheet" href="../styles/confirmation.css">
</head>
<body>
    <!-- Page Navigation (outside prototype) -->
    <a href="../index.html" class="page-home" aria-label="Back to overview">
        <img src="../public/illustrations/Home.svg" alt="Home">
    </a>

    <div class="device-frame">
        <div class="confirmation-screen-page">
            <!-- Status Bar -->
            <div class="status-bar">
                <span class="time">09:41</span>
                <div class="status-icons">
                    <svg class="signal" width="17" height="11" viewBox="0 0 17 11" fill="none">
                        <path fill-rule="evenodd" clip-rule="evenodd" d="M10.5 2C10.5 1.44772 10.9477 1 11.5 1H12.5C13.0523 1 13.5 1.44772 13.5 2V10C13.5 10.5523 13.0523 11 12.5 11H11.5C10.9477 11 10.5 10.5523 10.5 10V2ZM7 4C6.44772 4 6 4.44772 6 5V10C6 10.5523 6.44772 11 7 11H8C8.55228 11 9 10.5523 9 10V5C9 4.44772 8.55228 4 8 4H7ZM1.5 7C1.5 6.44772 1.94772 6 2.5 6H3.5C4.05228 6 4.5 6.44772 4.5 7V10C4.5 10.5523 4.05228 11 3.5 11H2.5C1.94772 11 1.5 10.5523 1.5 10V7ZM16 0C15.4477 0 15 0.447715 15 1V10C15 10.5523 15.4477 11 16 11H17C17.5523 11 18 10.5523 18 10V1C18 0.447715 17.5523 0 17 0H16Z" fill="black"/>
                    </svg>
                    <svg class="wifi" width="15" height="11" viewBox="0 0 15 11" fill="none">
                        <path fill-rule="evenodd" clip-rule="evenodd" d="M7.5 2.24268C9.68547 2.24268 11.6986 3.05823 13.2279 4.41588L14.6421 3.00167C12.7376 1.29326 10.2339 0.242676 7.5 0.242676C4.76614 0.242676 2.26239 1.29326 0.357864 3.00167L1.77208 4.41588C3.30139 3.05823 5.31453 2.24268 7.5 2.24268ZM7.5 6.24268C8.86972 6.24268 10.1205 6.74066 11.0919 7.56611L12.5061 6.1519C11.1602 4.97565 9.41174 4.24268 7.5 4.24268C5.58826 4.24268 3.83981 4.97565 2.49393 6.1519L3.90814 7.56611C4.8795 6.74066 6.13028 6.24268 7.5 6.24268ZM9.62132 9.62132L7.5 11.7426L5.37868 9.62132C6.0052 8.99479 6.86932 8.61396 7.5 8.61396C8.13068 8.61396 8.9948 8.99479 9.62132 9.62132Z" fill="black"/>
                    </svg>
                    <svg class="battery" width="25" height="12" viewBox="0 0 25 12" fill="none">
                        <rect opacity="0.35" x="0.5" y="0.833374" width="21" height="10.3333" rx="2.16667" stroke="black"/>
                        <path opacity="0.4" d="M23 4V8C23.8047 7.66122 24.328 6.87313 24.328 6C24.328 5.12687 23.8047 4.33878 23 4Z" fill="black"/>
                        <rect x="2" y="2.33337" width="18" height="7.33333" rx="1.33333" fill="black"/>
                    </svg>
                </div>
            </div>

            <!-- Close Button -->
            <a href="checkout.html" class="close-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                    <path d="M18 6L6 18M6 6l12 12" stroke="#262626" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </a>

            <!-- Scrollable Content -->
            <div class="confirmation-scroll">
                <!-- Hero Section with Product and Balloons -->
                <div class="hero-section">
                    <!-- Balloons -->
                    <img src="../public/illustrations/red_balloon.png" alt="" class="balloon red-balloon-1">
                    <img src="../public/illustrations/red_balloon.png" alt="" class="balloon red-balloon-2">
                    <img src="../public/illustrations/Depop_balloon.png" alt="" class="balloon depop-balloon">
                    <img src="../public/illustrations/star_balloon.png" alt="" class="balloon star-balloon">
                    <img src="../public/illustrations/red_balloon.png" alt="" class="balloon red-balloon-3">
                    
                    <!-- Animation Container -->
                    <div class="animation-container">
                        <!-- Product Image (gets sucked in) -->
                        <img src="../public/illustrations/Tee.jpg" alt="Vintage Tee" class="product-image">
                        
                        <!-- Box (pops up from bottom, then fades out) -->
                        <img src="../public/illustrations/Box_Tee.png" alt="" class="box-image">
                        
                        <!-- Parachute (fades in, then flies out top) -->
                        <img src="../public/illustrations/shipping_parachute.png" alt="" class="parachute-image">
                    </div>
                </div>

                <!-- Success Message -->
                <div class="success-message">
                    <h1>You've got it!</h1>
                    <p>It's yours now</p>
                </div>

                <!-- Divider -->
                <div class="section-divider"></div>

                <!-- Order Details -->
                <div class="order-details">
                    <div class="detail-row">
                        <span class="detail-label">
                            Estimated delivery
                            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                                <circle cx="8" cy="8" r="7" stroke="#747474" stroke-width="1.5"/>
                                <path d="M8 11V8M8 5.5V5" stroke="#747474" stroke-width="1.5" stroke-linecap="round"/>
                            </svg>
                        </span>
                        <span class="detail-value">7-11 September</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Shipping address</span>
                        <span class="detail-value">894 Jefferson Ave, Brooklyn, NY 11221, USA</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Total</span>
                        <span class="detail-value detail-with-icon">
                            <img src="../public/illustrations/Depop_Balance.jpg" alt="Depop Balance" class="detail-icon">
                            $0.00
                        </span>
                    </div>
                </div>

                <!-- Progress Tracker -->
                <div class="progress-tracker">
                    <h3 class="tracker-title">Your item's journey</h3>
                    <div class="progress-step completed">
                        <div class="step-icon completed">
                            <img src="../public/illustrations/confirm.png" alt="" class="step-img">
                        </div>
                        <div class="step-line"></div>
                        <span class="step-label">Purchased done</span>
                    </div>
                    <div class="progress-step active">
                        <div class="step-icon">
                            <img src="../public/illustrations/shipping_parachute.png" alt="" class="step-img">
                        </div>
                        <div class="step-line"></div>
                        <span class="step-label">Waiting for <strong>Domo</strong> to ship it</span>
                    </div>
                    <div class="progress-step">
                        <div class="step-icon">
                            <img src="../public/illustrations/Van.png" alt="" class="step-img">
                        </div>
                        <div class="step-line"></div>
                        <span class="step-label">Your parcel is on the way</span>
                    </div>
                    <div class="progress-step">
                        <div class="step-icon">
                            <img src="../public/illustrations/Box_Tee.png" alt="" class="step-img">
                        </div>
                        <span class="step-label">Order delivered</span>
                    </div>
                </div>
            </div>

            <!-- Footer with Buttons -->
            <footer class="confirmation-footer">
                <div class="footer-divider"></div>
                <div class="confirmation-actions">
                    <button class="btn-secondary">Message seller</button>
                    <button class="btn-primary">View receipt</button>
                </div>
                <div class="home-indicator"></div>
            </footer>
        </div>
    </div>
</body>
</html>
