<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Checkout - Brand Energy</title>
    <link rel="stylesheet" href="../styles/checkout.css">
</head>
<body>
    <!-- Page Navigation (outside prototype) -->
    <a href="../index.html" class="page-home" aria-label="Back to overview">
        <img src="../public/illustrations/Home.svg" alt="Home">
    </a>

    <div class="device-frame">
        <div class="checkout-screen">
            <!-- Status Bar -->
            <div class="status-bar">
                <span class="time">09:41</span>
                <div class="status-icons">
                    <svg class="signal" width="17" height="11" viewBox="0 0 17 11" fill="none">
                        <path fill-rule="evenodd" clip-rule="evenodd" d="M10.5 2C10.5 1.44772 10.9477 1 11.5 1H12.5C13.0523 1 13.5 1.44772 13.5 2V10C13.5 10.5523 13.0523 11 12.5 11H11.5C10.9477 11 10.5 10.5523 10.5 10V2ZM7 4C6.44772 4 6 4.44772 6 5V10C6 10.5523 6.44772 11 7 11H8C8.55228 11 9 10.5523 9 10V5C9 4.44772 8.55228 4 8 4H7ZM1.5 7C1.5 6.44772 1.94772 6 2.5 6H3.5C4.05228 6 4.5 6.44772 4.5 7V10C4.5 10.5523 4.05228 11 3.5 11H2.5C1.94772 11 1.5 10.5523 1.5 10V7ZM16 0C15.4477 0 15 0.447715 15 1V10C15 10.5523 15.4477 11 16 11H17C17.5523 11 18 10.5523 18 10V1C18 0.447715 17.5523 0 17 0H16Z" fill="black"/>
                    </svg>
                    <svg class="wifi" width="15" height="11" viewBox="0 0 15 11" fill="none">
                        <path fill-rule="evenodd" clip-rule="evenodd" d="M7.5 2.24268C9.68547 2.24268 11.6986 3.05823 13.2279 4.41588L14.6421 3.00167C12.7376 1.29326 10.2339 0.242676 7.5 0.242676C4.76614 0.242676 2.26239 1.29326 0.357864 3.00167L1.77208 4.41588C3.30139 3.05823 5.31453 2.24268 7.5 2.24268ZM7.5 6.24268C8.86972 6.24268 10.1205 6.74066 11.0919 7.56611L12.5061 6.1519C11.1602 4.97565 9.41174 4.24268 7.5 4.24268C5.58826 4.24268 3.83981 4.97565 2.49393 6.1519L3.90814 7.56611C4.8795 6.74066 6.13028 6.24268 7.5 6.24268ZM9.62132 9.62132L7.5 11.7426L5.37868 9.62132C6.0052 8.99479 6.86932 8.61396 7.5 8.61396C8.13068 8.61396 8.9948 8.99479 9.62132 9.62132Z" fill="black"/>
                    </svg>
                    <svg class="battery" width="25" height="12" viewBox="0 0 25 12" fill="none">
                        <rect opacity="0.35" x="0.5" y="0.833374" width="21" height="10.3333" rx="2.16667" stroke="black"/>
                        <path opacity="0.4" d="M23 4V8C23.8047 7.66122 24.328 6.87313 24.328 6C24.328 5.12687 23.8047 4.33878 23 4Z" fill="black"/>
                        <rect x="2" y="2.33337" width="18" height="7.33333" rx="1.33333" fill="black"/>
                    </svg>
                </div>
            </div>

            <!-- Navigation Bar -->
            <nav class="nav-bar">
                <button class="nav-back">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                        <path d="M19 12H5M12 19L5 12L12 5" stroke="#262626" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
                <h1 class="nav-title">Checkout</h1>
                <span class="nav-spacer"></span>
            </nav>

            <!-- Scrollable Content -->
            <main class="checkout-content">
                <!-- Product Card -->
                <section class="product-section">
                    <div class="product-card">
                        <img src="../public/illustrations/Tee.jpg" alt="Vintage Tee" class="product-image">
                        <div class="product-info">
                            <div class="product-content">
                                <h3 class="product-name">Vintage Tee</h3>
                                <p class="product-variant">Unisex</p>
                            </div>
                            <p class="product-price">$15.00</p>
                        </div>
                    </div>
                </section>

                <!-- Shipping Section -->
                <section class="shipping-section">
                    <div class="section-divider"></div>
                    <h2 class="section-title">Shipping to</h2>
                    <button class="address-card">
                        <div class="address-content">
                            <p class="address-name">John Doe</p>
                            <p class="address-line">168 Mott Street, New York, NY 10013</p>
                        </div>
                        <svg class="chevron" width="24" height="24" viewBox="0 0 24 24" fill="none">
                            <path d="M9 18L15 12L9 6" stroke="#262626" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </section>

                <!-- Payment Section -->
                <section class="payment-section">
                    <div class="section-divider"></div>
                    <h2 class="section-title">Pay using</h2>
                    <button class="payment-card">
                        <div class="payment-method-icon">
                            <img src="../public/illustrations/Depop_Balance.jpg" alt="Depop Balance">
                        </div>
                        <div class="payment-content">
                            <p class="payment-name">Depop Balance</p>
                            <p class="payment-detail">$20.00 applied</p>
                        </div>
                        <svg class="chevron" width="24" height="24" viewBox="0 0 24 24" fill="none">
                            <path d="M9 18L15 12L9 6" stroke="#262626" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </section>

                <!-- Price Summary Section -->
                <section class="summary-section">
                    <div class="section-divider"></div>
                    <h2 class="section-title">Price summary</h2>
                    <div class="price-rows">
                        <div class="price-row">
                            <span>Item price</span>
                            <span>$15.00</span>
                        </div>
                        <div class="price-row">
                            <span>Shipping</span>
                            <span>Free</span>
                        </div>
                        <div class="price-row">
                            <span class="with-help">
                                Marketplace fee
                                <button class="help-icon" aria-label="More info">
                                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                                        <circle cx="8" cy="8" r="7" stroke="#747474" stroke-width="1.5"/>
                                        <path d="M8 11V7M8 5V4.5" stroke="#747474" stroke-width="1.5" stroke-linecap="round"/>
                                    </svg>
                                </button>
                            </span>
                            <span>$5.00</span>
                        </div>
                        <div class="price-divider"></div>
                        <div class="price-row">
                            <span>Subtotal</span>
                            <span>$20.00</span>
                        </div>
                        <div class="price-row">
                            <span>Depop Balance</span>
                            <span>- $20.00</span>
                        </div>
                        <div class="price-divider"></div>
                        <div class="price-row total">
                            <span>Total to pay</span>
                            <span>$0.00</span>
                        </div>
                    </div>
                </section>
            </main>

            <!-- Fixed Bottom Bar -->
            <footer class="checkout-footer">
                <div class="footer-divider"></div>
                <div class="footer-total">
                    <span>Total to pay</span>
                    <span>$0.00</span>
                </div>
                <button class="pay-button" id="payButton">
                    <span class="btn-text">Pay now</span>
                    <span class="btn-loading" style="display: none;">
                        <svg class="spinner" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
                        </svg>
                    </span>
                </button>
                <p class="stripe-notice">This payment will be processed by Stripe</p>
                <div class="payment-methods">
                    <div class="payment-icon">
                        <img src="../public/illustrations/Depop_Balance.jpg" alt="Depop Balance">
                    </div>
                    <div class="payment-icon">
                        <img src="../public/illustrations/Apple_Pay.jpg" alt="Apple Pay">
                    </div>
                    <div class="payment-icon">
                        <img src="../public/illustrations/Klarna.jpg" alt="Klarna">
                    </div>
                    <div class="payment-icon">
                        <img src="../public/illustrations/Payment_card.jpg" alt="Card">
                    </div>
                    <div class="payment-icon">
                        <img src="../public/illustrations/Amex.png" alt="Amex">
                    </div>
                </div>
                <div class="home-indicator"></div>
            </footer>
        </div>
    </div>

    <script src="../scripts/checkout.js"></script>
</body>
</html>
