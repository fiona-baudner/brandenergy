<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brand Energy - Prototypes</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <img src="public/illustrations/Logo.png" alt="Depop" class="header-logo">
            <h1 class="logo">Brand Energy</h1>
            <p class="tagline">Prototype Showcase</p>
        </header>

        <main class="prototypes-grid">
            <a href="prototypes/checkout.html" class="prototype-card">
                <div class="card-icon">
                    <img src="public/illustrations/Bag.png" alt="Checkout">
                </div>
                <h2 class="card-title">Checkout</h2>
                <p class="card-description">E-commerce checkout flow with cart summary, shipping details, and payment processing.</p>
                <span class="card-link">View Prototype →</span>
            </a>

            <a href="prototypes/likes.html" class="prototype-card">
                <div class="card-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                    </svg>
                </div>
                <h2 class="card-title">Likes</h2>
                <p class="card-description">Interactive like/favorite system with animations and social engagement features.</p>
                <span class="card-link">View Prototype →</span>
            </a>
        </main>

        <footer class="footer">
            <p>Brand Energy Prototypes © 2026</p>
        </footer>
    </div>
</body>
</html>
